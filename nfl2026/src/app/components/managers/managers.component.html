<div class="container mt-4">
  <h2>Managers</h2>
  <table class="table table-striped table-bordered">
    <thead class="table-dark">
      <tr>
        <th>Name</th>
        <th>Team</th>
        </tr>
    </thead>
    <tbody>
      <tr *ngFor="let m of managersList">
        <td>{{ m.name }}</td>
        <td>{{ m.team }}</td>
      </tr>
    </tbody>
  </table>
</div>
