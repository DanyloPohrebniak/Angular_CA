<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Score For/Against</h2>
  </div>

  <div>
    <table class="table table-hover table-bordered shadow-sm">
      <thead class="table-dark">
        <tr>
          <th class="text-center">Team</th>
          <th class="text-center">For</th>
          <th class="text-center">Against</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let match of filteredResults">
            <td class="text-center">
              <span class="dot" [style.background-color]="'rgb(' + getTeamRgb(match.name) + ')'"></span>
              {{ match.name }}
            </td>
            <td class="text-center">{{ match.for }}</td>
            <td class="text-center">{{ match.against }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <p *ngIf="filteredResults.length === 0" class="text-center mt-5">No results found</p>

  <hr>
  <h3 class="mb-3">Visualisation</h3>
  <div id="chart-div" class="bg-white p-3 border rounded shadow-sm"></div>
  
</div>
