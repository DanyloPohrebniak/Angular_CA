<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Results</h2>
    
    <div class="col-md-3">
      <select class="form-select" [(ngModel)]="selectedDivision" (change)="applyFilter()">
        <option *ngFor="let div of divisions" [value]="div.value">{{ div.label }}</option>
      </select>
    </div>
  </div>

  <div *ngFor="let group of groupedResults" class="mb-5">
    <div class="bg-secondary text-white p-2 mb-2 rounded shadow-sm">
      <h4 class="m-0">Round {{ group.roundName }}</h4>
    </div>

    <table class="table table-hover table-bordered shadow-sm">
      <thead class="table-light">
        <tr>
          <th>Division</th>
          <th class="text-center">Home Team</th>
          <th class="text-center">Score</th>
          <th class="text-center">Score</th>
          <th class="text-center">Away Team</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let match of group.matches">
          <td class="text-center">{{ match.division }}</td>
          <td class="text-center"><span class="dot" [style.background-color]="'rgb(' + match.rgb + ')'"></span>{{ match.hteam }}</td>
          <td class="text-center">{{ match.hteamscore }} ({{ match.hteamtotal}})</td>
          <td class="text-center">{{ match.ateamscore }} ({{ match.ateamtotal}})</td>
          <td class="text-center"><span class="dot" [style.background-color]="'rgb(' + match.rgb + ')'"></span>{{ match.ateam }}</td>
        </tr>
      </tbody>
    </table>
  </div>
  
  <p *ngIf="groupedResults.length === 0" class="text-center mt-5">No results found for this division.</p>
</div>
