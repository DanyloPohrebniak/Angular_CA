<div class="container mt-5 text-center">
  <h2 class="mb-4">Which has been the better team lately?</h2>
  
  <div class="row mt-5 justify-content-center">
    <div *ngFor="let team of pair" class="col-md-4">
      <button (click)="handleVote(team.id)" class="btn btn-outline-primary btn-lg w-100 p-5 shadow font-weight-bold" style="font-size: 1.5rem;">
        {{ team.name }}
      </button>
    </div>
    
    <div class="col-12 mt-4" *ngIf="pair.length === 2">
      <p class="text-muted">Click on the team you think is stronger!</p>
    </div>

    <div class="alert alert-info d-inline-block shadow-sm">Votes remaining: <strong>{{ votesRemaining }}</strong></div>
  </div>
</div>
